name: Build hibeaver

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix build.gradle (remove bintray plugin and broken repositories)
        run: |
          # 删除 apply plugin: 'com.jfrog.bintray' 行
          sed -i '/apply plugin: .*bintray/d' build.gradle
          # 删除 bintray 配置块
          sed -i '/bintray {/,/^}/d' build.gradle
          # 将 jcenter() 替换为 mavenCentral + 阿里云镜像
          sed -i 's|jcenter()|mavenCentral()\n        maven { url "https://maven.aliyun.com/repository/jcenter" }|g' build.gradle
          # 可选：添加 google()（如果不需要可忽略）
          # 显示修改后的文件（调试用，可删除）
          cat build.gradle

      - name: Build jar
        run: ./gradlew jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hibeaver-1.2.7
          path: build/libs/hibeaver-*.jar
